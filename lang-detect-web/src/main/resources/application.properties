server.port=${PORT:8080}
spring.application.name=lang-detect

# Actuator: expose health (+ liveness/readiness groups) for Cloud Run probes.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Detection limits and behavior (see DetectionProperties). Defaults shown.
langdetect.min-length=25
langdetect.max-length=100000
langdetect.max-payload-bytes=1048576
langdetect.warmup=true
langdetect.cache-max-entries=500
langdetect.cache-max-text-length=4096
# langdetect.allowed-origins=https://example.com
